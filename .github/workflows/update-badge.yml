name: Update GHS Time Badge

on:
  schedule:
    - cron: "*/15 * * * *" # Every 15 minutes
  workflow_dispatch:

jobs:
  update-badge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install & Build
        run: |
          npm install
          npm run build:core
          npm run build:cli

      - name: Calculate GHS Time
        id: calc_time
        run: |
          GHS_TIME=$(node packages/cli/dist/badge.js)
          echo "time=$GHS_TIME" >> $GITHUB_OUTPUT

      - name: Update Gist
        uses: Schneegans/dynamic-badges-action@v1.8.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: ea238f96af6f644ffe06415ee941e7a6
          filename: ghs-time.json
          label: GHS NOW
          message: ${{ steps.calc_time.outputs.time }}
          color: blueviolet
          labelColor: 555555
